name: Keep Kcuni awake

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Ping Render health endpoint
        run: curl --fail --silent --show-error --max-time 90 --retry 2 https://kcuni-bot.onrender.com/healthz
