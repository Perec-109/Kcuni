services:
  - type: web
    name: kcuni-bot
    runtime: node
    plan: free
    rootDir: botfather-bot
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /healthz
    autoDeployTrigger: commit
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: AI_PROVIDER
        value: gemini
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-flash-lite-latest
      - key: NEWS_FEEDS
        value: https://news.google.com/rss?hl=ru&gl=RU&ceid=RU:ru
      - key: DEFAULT_TIMEZONE
        value: Europe/Minsk
      - key: PROACTIVE_SCHEDULE
        value: "13:00,21:00,23:30"
      - key: PROACTIVE_CHECK_MINUTES
        value: "5"
      - key: PROACTIVE_SILENCE_MINUTES
        value: "360"
      - key: PROACTIVE_MEDIA_CHANCE
        value: "0.04"
      - key: RENDER_KEEP_ALIVE
        value: "true"
      - key: REMINDER_CHECK_MS
        value: "30000"
      - key: MAX_MESSAGES_PER_REPLY
        value: "2"
      - key: TYPING_MIN_MS
        value: "2000"
      - key: TYPING_MAX_MS
        value: "10000"
      - key: TYPING_BASE_MS
        value: "1800"
      - key: TYPING_PER_CHAR_MS
        value: "28"
      - key: TYPING_PER_WORD_MS
        value: "120"
